services:
  migrate:
    build:
      context: .
      target: builder
    command: npx prisma migrate deploy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://trivia:${POSTGRES_PASSWORD}@db:5432/trivia
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      target: production-web
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://trivia:${POSTGRES_PASSWORD}@db:5432/trivia
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  bot:
    build:
      context: .
      target: production-bot
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://trivia:${POSTGRES_PASSWORD}@db:5432/trivia
      BOT_PORT: 3001
      LANG: fi
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: trivia
      POSTGRES_USER: trivia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trivia"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
