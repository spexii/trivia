services:
  migrate:
    build:
      context: .
      target: deps
    command: npx prisma db push
    env_file: .env
    environment:
      DATABASE_URL: postgresql://trivia:${POSTGRES_PASSWORD}@db:5432/trivia
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      target: dev-web
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://trivia:${POSTGRES_PASSWORD}@db:5432/trivia
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  bot:
    build:
      context: .
      target: dev-bot
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://trivia:${POSTGRES_PASSWORD}@db:5432/trivia
      BOT_PORT: 3001
      LANG: fi
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: trivia
      POSTGRES_USER: trivia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trivia"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata_dev:
